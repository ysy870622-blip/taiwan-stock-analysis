<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>台股日 K 儀表板</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f19;--panel:#131929;--card:#192035;--border:#1f2d45;
  --text:#dde4f0;--muted:#5a6a85;--sub:#8899b4;
  --green:#10b981;--red:#f43f5e;--blue:#3b8ef3;
  --yellow:#f59e0b;--purple:#a78bfa;--orange:#f97316;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;background:var(--panel);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,#10b981,#3b8ef3);
  border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo svg{width:18px;height:18px}
.header h1{font-size:1rem;font-weight:700;letter-spacing:.2px}
.header-date{font-size:.72rem;color:var(--muted)}
.update-badge{font-size:.65rem;padding:3px 10px;border-radius:999px;
  background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.tabs-wrap{padding:14px 28px 0;background:var(--panel);border-bottom:1px solid var(--border)}
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:0}
.tab{padding:7px 16px;border-radius:8px 8px 0 0;font-size:.78rem;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--muted);
  border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:rgba(59,142,243,.08)}
.tab-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.main{padding:24px 28px;display:flex;flex-direction:column;gap:20px}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.stat .sl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.stat .sv{font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums}
.stat .ss{font-size:.7rem;color:var(--muted);margin-top:3px}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-sub{color:var(--sub)}
.chart-row{display:grid;grid-template-columns:1fr 300px;gap:16px}
@media(max-width:900px){.chart-row{grid-template-columns:1fr}}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.chart-box h3{font-size:.8rem;font-weight:700;color:var(--sub);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ohlcv{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.ohlcv h3{font-size:.8rem;font-weight:700;color:var(--sub);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.ohlcv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ohlcv-item{background:var(--panel);border-radius:10px;padding:12px}
.ohlcv-item .ol{font-size:.62rem;color:var(--muted);margin-bottom:4px}
.ohlcv-item .ov{font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums}
.candle-preview{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.legend{display:flex;gap:16px;margin-bottom:12px;font-size:.68rem;color:var(--muted)}
.leg{display:flex;align-items:center;gap:5px}
.leg-line{width:20px;height:2px;border-radius:1px}
.vol-section{margin-top:10px}
.vol-label{font-size:.65rem;color:var(--muted);margin-bottom:6px}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px;cursor:pointer;transition:border-color .15s,transform .1s;border-top:3px solid transparent}
.ov-card:hover{border-color:#2a3f60;transform:translateY(-2px)}
.ov-card.active-card{border-top-color:var(--blue)}
.ov-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ov-id{font-weight:800;font-size:.95rem}
.ov-name{font-size:.65rem;color:var(--muted);margin-top:1px}
.ov-badge{font-size:.6rem;padding:2px 8px;border-radius:999px;font-weight:700}
.ov-price{font-size:1.3rem;font-weight:800;font-variant-numeric:tabular-nums;margin-bottom:3px}
.ov-diff{font-size:.72rem;font-weight:700}
.mini-spark{margin-top:10px}
#tooltip{position:fixed;background:#1a2540;border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;font-size:.72rem;pointer-events:none;opacity:0;transition:opacity .1s;
  z-index:999;min-width:160px}
#tooltip .tt-date{color:var(--muted);margin-bottom:6px;font-size:.65rem}
#tooltip .tt-row{display:flex;justify-content:space-between;gap:20px;margin-bottom:3px}
#tooltip .tt-label{color:var(--muted)}
#tooltip .tt-val{font-weight:700;font-variant-numeric:tabular-nums}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1f2d45;border-radius:999px}
</style>
</head>

const DATA=RAW.stocks,ORDER=RAW.order;
let current=ORDER[0];
const $=id=>document.getElementById(id);
const num=n=>n==null?'—':n.toLocaleString('zh-TW');
const pct=n=>(n>0?'+':'')+n+'%';
function diffColor(d){return d<0?'var(--red)':d<5?'var(--green)':d<15?'var(--yellow)':'var(--orange)'}
function diffBg(d){return d<0?'rgba(244,63,94,.13)':d<5?'rgba(16,185,129,.13)':d<15?'rgba(245,158,11,.13)':'rgba(249,115,22,.13)'}

function buildTabs(){
  $('tabs').innerHTML=ORDER.map(id=>{
    const s=DATA[id],c=s.spread>=0?'var(--green)':'var(--red)';
    return `<button class="tab ${id===current?'active':''}" onclick="switchStock('${id}')">
      <span class="tab-dot" style="background:${c}"></span>${id} ${s.name}</button>`;
  }).join('');
}

function buildStats(id){
  const s=DATA[id],sc=s.spread>=0?'c-green':'c-red',sg=s.spread>=0?'+':'';
  $('statRow').innerHTML=`
    <div class="stat"><div class="sl">最新收盤</div><div class="sv">${num(s.price)}</div><div class="ss">${s.date}</div></div>
    <div class="stat"><div class="sl">漲跌</div><div class="sv ${sc}">${sg}${num(s.spread)}</div><div class="ss">${sg+s.diff}% vs 昨收</div></div>
    <div class="stat"><div class="sl">20MA 乖離</div><div class="sv" style="color:${diffColor(s.diff)}">${pct(s.diff)}</div><div class="ss">MA20 ${num(s.ma20)}</div></div>
    <div class="stat"><div class="sl">5MA</div><div class="sv c-sub">${num(s.ma5)}</div><div class="ss">收 ${s.price>s.ma5?'站上':'跌破'} 5MA</div></div>
    <div class="stat"><div class="sl">成交量</div><div class="sv c-blue" style="font-size:1.1rem">${(s.volume/1e6).toFixed(2)}M</div><div class="ss">張</div></div>`;
}

function buildOHLCV(id){
  const s=DATA[id];
  const sp=s.spread>=0?`<span class="c-green">+${num(s.spread)}</span>`:`<span class="c-red">${num(s.spread)}</span>`;
  $('ohlcvGrid').innerHTML=`
    <div class="ohlcv-item"><div class="ol">開盤</div><div class="ov">${num(s.open)}</div></div>
    <div class="ohlcv-item"><div class="ol">最高</div><div class="ov c-green">${num(s.high)}</div></div>
    <div class="ohlcv-item"><div class="ol">最低</div><div class="ov c-red">${num(s.low)}</div></div>
    <div class="ohlcv-item"><div class="ol">收盤</div><div class="ov">${num(s.price)}</div></div>
    <div class="ohlcv-item" style="grid-column:span 2"><div class="ol">漲跌</div><div class="ov">${sp}</div></div>`;
  const up=s.price>=s.open,col=up?'#10b981':'#f43f5e';
  const rng=s.high-s.low||1;
  const bH=Math.max(Math.abs(s.price-s.open)/rng*60,3);
  const uW=(s.high-Math.max(s.price,s.open))/rng*60;
  const lW=(Math.min(s.price,s.open)-s.low)/rng*60;
  $('candlePreview').innerHTML=`<div style="display:flex;align-items:center;gap:14px">
    <svg width="32" height="72" viewBox="0 0 32 72">
      <line x1="16" y1="0" x2="16" y2="${uW}" stroke="${col}" stroke-width="2"/>
      <rect x="9" y="${uW}" width="14" height="${Math.max(bH,3)}" rx="2" fill="${col}"/>
      <line x1="16" y1="${uW+bH}" x2="16" y2="${uW+bH+lW}" stroke="${col}" stroke-width="2"/>
    </svg>
    <div style="font-size:.7rem;color:var(--muted);line-height:2">
      <div>區間 <span style="color:var(--text);font-weight:700">${num(s.high)} / ${num(s.low)}</span></div>
      <div>振幅 <span style="color:var(--text);font-weight:700">${((s.high-s.low)/s.low*100).toFixed(2)}%</span></div>
      <div>成交量 <span style="color:var(--blue);font-weight:700">${(s.volume/1e4).toFixed(0)} 萬張</span></div>
    </div></div>`;
}

function buildLineChart(id){
  const hist=DATA[id].history.filter(r=>r.close!=null);
  if(!hist.length)return;
  const W=680,H=220,PL=52,PR=10,PT=12,PB=24,cW=W-PL-PR,cH=H-PT-PB;
  const prices=hist.map(r=>r.close);
  const allV=[...prices,...hist.map(r=>r.ma5).filter(Boolean),...hist.map(r=>r.ma20).filter(Boolean)];
  const minV=Math.min(...allV)*0.995,maxV=Math.max(...allV)*1.005;
  const xStep=cW/(hist.length-1||1);
  const scY=v=>PT+cH-(v-minV)/(maxV-minV)*cH;
  const scX=i=>PL+i*xStep;
  let svg='';
  for(let i=0;i<=4;i++){
    const v=minV+(maxV-minV)*i/4,y=scY(v);
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1a2540" stroke-width="1"/>
          <text x="${PL-4}" y="${y+4}" text-anchor="end" fill="#4a5a75" font-size="10">${Math.round(v).toLocaleString()}</text>`;
  }
  const skip=Math.ceil(hist.length/7);
  hist.forEach((r,i)=>{
    if(i%skip===0||i===hist.length-1)
      svg+=`<text x="${scX(i)}" y="${H-4}" text-anchor="middle" fill="#4a5a75" font-size="9">${r.date.slice(5)}</text>`;
  });
  const cpts=hist.map((r,i)=>`${scX(i)},${scY(r.close)}`).join(' ');
  svg+=`<defs><linearGradient id="gC" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3b8ef3" stop-opacity=".25"/>
    <stop offset="100%" stop-color="#3b8ef3" stop-opacity="0"/>
  </linearGradient></defs>
  <polygon points="${scX(0)},${scY(minV)} ${cpts} ${scX(hist.length-1)},${scY(minV)}" fill="url(#gC)"/>
  <polyline points="${cpts}" fill="none" stroke="#3b8ef3" stroke-width="2" stroke-linejoin="round"/>`;
  const m5pts=hist.filter(r=>r.ma5!=null).map(r=>`${scX(hist.indexOf(r))},${scY(r.ma5)}`).join(' ');
  if(m5pts)svg+=`<polyline points="${m5pts}" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3"/>`;
  const m20pts=hist.filter(r=>r.ma20!=null).map(r=>`${scX(hist.indexOf(r))},${scY(r.ma20)}`).join(' ');
  if(m20pts)svg+=`<polyline points="${m20pts}" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3"/>`;
  hist.forEach((r,i)=>{
    svg+=`<rect x="${scX(i)-xStep/2}" y="${PT}" width="${xStep}" height="${cH}" fill="transparent"
               onmouseenter="showTip(event,${JSON.stringify(r).replace(/"/g,"'")})"
               onmouseleave="hideTip()"/>`;
  });
  $('lineChart').innerHTML=svg;
  const vols=hist.map(r=>r.Trading_Volume||0),maxVol=Math.max(...vols)||1;
  const bW=Math.max(cW/hist.length-1,1);
  let vsv='';
  hist.forEach((r,i)=>{
    const bh=((r.Trading_Volume||0)/maxVol)*46,x=PL+i*xStep-bW/2,up=r.close>=r.open;
    vsv+=`<rect x="${x}" y="${50-4-bh}" width="${bW}" height="${bh}" rx="1"
               fill="${up?'rgba(16,185,129,.5)':'rgba(244,63,94,.5)'}"/>`;
  });
  $('volChart').innerHTML=vsv;
}

function showTip(e,r){
  const tt=$('tooltip');
  $('tt-date').textContent=r.date;$('tt-close').textContent=num(r.close);
  $('tt-open').textContent=num(r.open);$('tt-high').textContent=num(r.max);
  $('tt-low').textContent=num(r.min);$('tt-ma5').textContent=num(r.ma5);
  $('tt-ma20').textContent=num(r.ma20);tt.style.opacity='1';
  const x=e.clientX+14,y=e.clientY-10;
  tt.style.left=(x+180>window.innerWidth?x-200:x)+'px';
  tt.style.top=(y+160>window.innerHeight?y-160:y)+'px';
}
function hideTip(){$('tooltip').style.opacity='0';}

function buildOverview(){
  $('overviewGrid').innerHTML=ORDER.map(id=>{
    const s=DATA[id],c=diffColor(s.diff);
    const hist=s.history.slice(-20).filter(r=>r.close);
    const prices=hist.map(r=>r.close),mn=Math.min(...prices),mx=Math.max(...prices)||mn+1;
    const W=160,H=36,pts=prices.map((v,i)=>`${i/(prices.length-1||1)*W},${H-(v-mn)/(mx-mn||1)*H}`).join(' ');
    const col=s.spread>=0?'#10b981':'#f43f5e';
    return `<div class="ov-card ${id===current?'active-card':''}" onclick="switchStock('${id}')" id="ovc-${id}">
      <div class="ov-top">
        <div><div class="ov-id">${id}</div><div class="ov-name">${s.name}</div></div>
        <span class="ov-badge" style="background:${diffBg(s.diff)};color:${c}">${pct(s.diff)}</span>
      </div>
      <div class="ov-price" style="color:${col}">${num(s.price)}</div>
      <div class="ov-diff" style="color:${col}">${s.spread>=0?'+':''}${num(s.spread)} (${(s.spread>=0?'+':'')+s.diff}%)</div>
      <div class="mini-spark">
        <svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block;height:36px">
          <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div></div>`;
  }).join('');
}

function switchStock(id){
  current=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent.trim().startsWith(id)));
  document.querySelectorAll('.ov-card').forEach(c=>c.classList.remove('active-card'));
  const ovc=$('ovc-'+id);if(ovc)ovc.classList.add('active-card');
  buildStats(id);buildOHLCV(id);buildLineChart(id);
}

$('headerDate').textContent=`資料日期：${DATA[ORDER[0]].date}`;
buildTabs();buildOverview();switchStock(current);
</script>
</body>
</html>
